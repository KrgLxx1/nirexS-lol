<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nirex</title>
    <meta name="description" content="nirex — Developer & Designer">
    <link rel="icon" href="https://files.catbox.moe/ho2df9.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Video -->
    <video id="bg-video" autoplay muted loop playsinline></video>
    <div class="video-overlay"></div>

    <!-- Particles Canvas -->
    <canvas id="particles"></canvas>

    <!-- Click Overlay -->
    <div class="overlay" id="overlay">
        <video id="overlay-video" autoplay muted loop playsinline></video>
        <div class="overlay-blur"></div>
        <div class="overlay-content">
            <div class="overlay-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" />
                    <path d="M10 8L16 12L10 16V8Z" fill="currentColor" stroke="none" />
                </svg>
            </div>
            <div class="overlay-title">click anywhere to enter</div>
        </div>
    </div>

    <!-- Audio Toggle -->
    <button class="audio-toggle" id="audioToggle" title="Toggle Music">
        <svg id="audioIcon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
    </button>

    <!-- Main Profile Content -->
    <div class="profile-wrapper" id="profileWrapper">

        <!-- Profile Picture -->
        <div class="avatar-container" id="avatarContainer">
            <img src="https://files.catbox.moe/ho2df9.png" alt="Avatar" class="avatar" id="avatar">
            <div class="avatar-ring"></div>
            <div class="avatar-glow"></div>
        </div>

        <!-- Username -->
        <h1 class="username" id="username">nirex</h1>

        <!-- Badge Row -->
        <div class="badges-row" id="badgesRow">
            <div class="badge-item" title="Developer">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" />
                </svg>
            </div>
            <div class="badge-item" title="Verified">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="m8.6 22.5l-1.9-3.2l-3.6-.8l.35-3.7L1 12l2.45-2.8l-.35-3.7l3.6-.8l1.9-3.2L12 2.95l3.4-1.45l1.9 3.2l3.6.8l-.35 3.7L23 12l-2.45 2.8l.35 3.7l-3.6.8l-1.9 3.2l-3.4-1.45l-3.4 1.45Z" />
                </svg>
            </div>
        </div>

        <!-- Bio -->
        <p class="bio" id="bio">yeah i coder mate | Python Developer, C#, JS, Front-End | Design - Graphical Designer
        </p>


        <div class="location" id="location">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
            </svg>
            <span>New York</span>
        </div>


        <!-- Social Links (generated from config.js) -->
        <div class="social-links" id="socialLinks"></div>

        <!-- View Counter -->
        <div class="view-counter" id="viewCounter">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path
                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zM12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
            </svg>
            <span id="viewCount">0</span>
        </div>
    </div><!-- /profile-wrapper -->

    <!-- Hidden Audio Element -->
    <audio id="bgAudio" loop preload="auto"></audio>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
